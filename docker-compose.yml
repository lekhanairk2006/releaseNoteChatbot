services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: releasenote_backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploaded_files:/app/uploaded_files
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: releasenote_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy